# EMC controller parameters for a simulated machine.

# General note: Comments can either be preceded with a # or ; - either is
# acceptable, although # is in keeping with most linux config files.

# General section -------------------------------------------------------------
[EMC]
# Version of this INI file
VERSION = 1.1

# Name of machine, for use with display, etc.
MACHINE = CNC_EMILL

# Debug level, 0 means no messages. See src/emc/nml_int/emcglb.h for others
# DEBUG = 0x7FFFFFFF
DEBUG = 0

# Sections for display options ------------------------------------------------
[DISPLAY]

OPEN_FILE = ~/linuxcnc/nc_files/pb_examples/blank.ngc
CONFIG_FILE = custom_config.yml

USER_TABS_PATH = user_tabs/

# Name of display program, e.g., axis or probe_basic
DISPLAY = probe_basic
ENVIRONMENT = QTPYVCP_CUSTOM_CONFIG=/home/aimilios/linuxcnc/configs/CNC_EMILL/custom_config.yml PYTHONPATH=/home/aimilios/linuxcnc/configs/CNC_EMILL


EDITOR = gedit

# Cycle time, in seconds, that display will sleep between polls
CYCLE_TIME = 0.100

# Path to help file
HELP_FILE = doc/help.txt

# Initial display setting for position, RELATIVE or MACHINE
POSITION_OFFSET = RELATIVE

# Initial display setting for position, COMMANDED or ACTUAL
POSITION_FEEDBACK = ACTUAL

GRIDS = 10mm 20mm 50mm 100mm 1in 2in 5in 10in

USER_DROS_PATH = user_dro_display/
DRO_DISPLAY = XYZA

# Highest value that will be allowed for feed override, 1.0 = 100%
MAX_FEED_OVERRIDE = 2.0
MIN_SPINDLE_OVERRIDE = 0.5
MAX_SPINDLE_OVERRIDE = 2.0
DEFAULT_SPINDLE_SPEED = 0

# Prefix to be used
PROGRAM_PREFIX = /home/aimilios/linuxcnc/nc_files


# Introductory graphic
INTRO_GRAPHIC = linuxcnc.gif
INTRO_TIME = 1

INCREMENTS = JOG 5mm 1mm .1mm .01mm .001mm .0001mm

PYVCP = pyvcp_panel.xml


#[ATC]
# Carousel images are available for 8, 10, 12, 14, 16, 18, 20, 21, 24 pocket changers
#POCKETS = 36
# The Z height your spindle needs to be at to clamp/unclamp a tool from the ATC platter
#Z_TOOL_CHANGE_HEIGHT = -100
# The Z clearance height in machine coordinates your spindle needs to be at to clear the tools during carousel rotation 
#Z_TOOL_CLEARANCE_HEIGHT = 5
# Step Time should be set to the approximate time it takes your ATC to rotate from one pocket to the next entry is in milliseconds(1 second = 1000ms)
# This just adjust the speed of the ATC tab Carousel GFX rotation (default if omitted is 1000ms)
#STEP_TIME = 500

[FILTER]
PROGRAM_EXTENSION = .png,.gif,.jpg Grayscale Depth Image
PROGRAM_EXTENSION = .py Python Script
PROGRAM_EXTENSION = .nc,.tap G-Code File
png = image-to-gcode
gif = image-to-gcode
jpg = image-to-gcode
py = python

# Task controller section -----------------------------------------------------
[TASK]

# Name of task controller program, e.g., milltask
TASK = milltask

# Cycle time, in seconds, that task controller will sleep between polls
CYCLE_TIME = 0.001

# Part program interpreter section --------------------------------------------
[RS274NGC]
#RS274NGC_STARTUP_CODE = G17 G21 G40 G43H0 G54 G64P0.000 G80 G90 G94 G97 M5 M9
# File containing interpreter variables
PARAMETER_FILE = probe_basic.var
OWORD_NARGS = 1
NO_DOWNCASE_OWORD = 1
SUBROUTINE_PATH = subroutines

# Motion control section ------------------------------------------------------
[EMCMOT]
EMCMOT = motmod

# Timeout for comm to emcmot, in seconds
COMM_TIMEOUT = 1.0

# BASE_PERIOD is unused in this configuration but specified in core_sim.hal
BASE_PERIOD = 0
# Servo task period, in nano-seconds
SERVO_PERIOD = 1000000
# Home mode -6 from EL8 Drive
HOMEMOD=always_homed
#HOMEMOD=always_homed

# section for main IO controller parameters -----------------------------------
[EMCIO]

# Name of IO controller program, e.g., io
EMCIO = io

# cycle time, in seconds
CYCLE_TIME = 0.100

# tool table file
TOOL_TABLE = sim_mm.tbl
TOOL_CHANGE_QUILL_UP = 1
#TOOL_CHANGE_POSITION = -600 0 0
#TOOL_CHANGE_WITH_SPINDLE_OFF = 1

# Hardware Abstraction Layer section --------------------------------------------------
[HAL]

# The run script first uses halcmd to execute any HALFILE
# files, and then to execute any individual HALCMD commands.
#

# list of hal config files to run through halcmd
# files are executed in the order in which they appear

HALFILE = Cumark_ES850S_Modbus.hal
HALFILE = mpg.hal
HALFILE = CNC_EMILL.hal
#HALFILE = core_sim.hal
#HALFILE = sim_spindle_encoder.hal
#HALFILE = axis_manualtoolchange.hal
#HALFILE = simulated_home.hal

# list of halcmd commands to execute
# commands are executed in the order in which they appear
#HALCMD = save neta

# Single file that is executed after the GUI has started.  Only supported by
# AXIS at this time (only AXIS creates a HAL component of its own)
#POSTGUI_HALFILE = test_postgui.hal
POSTGUI_HALFILE = probe_basic_postgui.hal

HALUI = halui

TWOPASS = on

# Trajectory planner section --------------------------------------------------
[TRAJ]
COORDINATES = X Y Z A
LINEAR_UNITS = mm
ANGULAR_UNITS = degree
DEFAULT_LINEAR_VELOCITY = 50
MAX_LINEAR_VELOCITY = 250
SPINDLES = 1
#DEFAULT_LINEAR_ACCELERATION = 508
#MAX_LINEAR_ACCELERATION = 508
#NO_FORCE_HOMING=1

[KINS]
JOINTS = 4
KINEMATICS = trivkins coordinates=XYZA

# Axes sections ---------------
[AXIS_X]
MAX_VELOCITY = 250
MAX_ACCELERATION = 2000
MIN_LIMIT = -1008
MAX_LIMIT = 2

[JOINT_0]
TYPE = LINEAR
HOME = 0.000
MIN_LIMIT = -1008
MAX_LIMIT = 2
MAX_VELOCITY = 250
MAX_ACCELERATION = 2000
HOME_ABSOLUTE_ENCODER = 2

# --- PID SETTINGS ---
P = 0
I = 0
D = 0
FF0 = 1
FF1 = 0.00074
#FF1 = 0.0012 to match Y but 10um oversized
#FF1 = 0.0157 (zero following error but overshoot) 0.1
FF2 = 0
#FF2 = 0.00006
DEADBAND = 0

# --- SAFETY LIMITS ---
# Now that FF1 hides the lag, we can set real limits.
# If the drive physically jams and lags by >0.5mm, stop the machine.
MIN_FERROR = 2
FERROR = 5

[AXIS_Y]
MAX_VELOCITY = 250
MAX_ACCELERATION = 2000
MIN_LIMIT = -548
MAX_LIMIT = 2

[JOINT_1]
TYPE = LINEAR
HOME = 0.000
MIN_LIMIT = -548
MAX_LIMIT = 2
MAX_VELOCITY = 250
MAX_ACCELERATION = 2000
HOME_ABSOLUTE_ENCODER = 2

# --- PID SETTINGS ---
P = 0
I = 0
D = 0
FF0 = 1
FF1 = 0.0012
#FF1 = 0.0064(zero following error but overshoot) 0.006
FF2 = 0
#FF2 = 0.00004
DEADBAND = 0

# --- SAFETY LIMITS ---
MIN_FERROR = 2
FERROR = 5

[AXIS_Z]
MAX_VELOCITY = 200
MAX_ACCELERATION = 1800
MIN_LIMIT = -360
MAX_LIMIT = 2

[JOINT_2]
TYPE = LINEAR
HOME = 0.0
MIN_LIMIT = -360
MAX_LIMIT = 2
MAX_VELOCITY = 200
MAX_ACCELERATION = 1800
HOME_ABSOLUTE_ENCODER = 2

# --- PID SETTINGS ---
P = 0
I = 0
D = 0
FF0 = 1
FF1 = 0.00492
#FF1 = 0.0194 (zero following error but overshoot) 0.008
FF2 = 0
#FF2 = 0.00011
DEADBAND = 0

# --- SAFETY LIMITS ---
MIN_FERROR = 2
FERROR = 5

[AXIS_A]
MAX_VELOCITY = 150
#MAX_VELOCITY = 234 at full 39 rpm after proper power supply  installed)
MAX_ACCELERATION = 1000
MIN_LIMIT = -1e99
MAX_LIMIT = 1e99

[JOINT_3]
TYPE = ANGULAR
HOME = 0.0
MIN_LIMIT = -1e99
MAX_LIMIT = 1e99
MAX_VELOCITY = 150
MAX_ACCELERATION = 1000
HOME_ABSOLUTE_ENCODER = 2

# --- PID SETTINGS ---
P = 0
I = 0
D = 0
FF0 = 1
FF1 = 0
#FF1 = 0.015
FF2 = 0
DEADBAND = 0

# --- SAFETY LIMITS ---
# A Axis usually needs slightly looser tolerance
MIN_FERROR = 0.5
FERROR = 2.0

[SPINDLE_0]
ENCODER = TRUE


